<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>V-Pet · Mascota Virtual</title>
<style>
/* === V-Pet 90s rectangular - estilo Bandai Digital Monster === */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --device:#9ca095;
  --device-dk:#5a5d54;
  --device-hl:#cbcec3;
  --device-shadow:#393b34;
  --screen-bg:#9bb27a;
  --screen-dk:#1f2614;
  --btn:#2a2823;
  --btn-dk:#0e0d0a;
  --text:#f0ecd8;
  --orange:#c97a3a;
  --red:#a83a3a;
}
body{
  font-family:'Trebuchet MS','Verdana',sans-serif;
  background:
    radial-gradient(ellipse at 30% 20%,#3a3d4a 0%,#1a1c25 70%);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:10px;color:var(--screen-dk);
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
}
.device{
  background:
    /* textura plástica granulada */
    repeating-linear-gradient(0deg, rgba(0,0,0,.04) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px),
    linear-gradient(160deg, var(--device-hl) 0%, var(--device) 45%, var(--device-dk) 100%);
  border-radius:14px 14px 18px 18px;
  padding:18px 16px 20px;
  width:100%;max-width:340px;
  box-shadow:
    inset -3px -4px 0 var(--device-shadow),
    inset 3px 3px 0 var(--device-hl),
    inset 0 -14px 22px rgba(0,0,0,.18),
    0 12px 32px rgba(0,0,0,.55);
  position:relative;
}
/* "Antena" superior tipo Digivice */
.device::before{
  content:'';position:absolute;top:-10px;right:18px;width:18px;height:14px;
  background:var(--device-dk);border-radius:3px 3px 0 0;
  box-shadow:inset 1px 1px 0 var(--device);
}
/* Asita inferior */
.device::after{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:60px;height:8px;background:var(--device-dk);
  border-radius:0 0 6px 6px;box-shadow:inset 1px 1px 0 rgba(255,255,255,.08);
}
.device-top{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:6px}
.speaker{width:38px;height:5px;background:repeating-linear-gradient(90deg,var(--device-dk) 0 3px,transparent 3px 5px);border-radius:2px}
.brand{font-family:'Courier New',monospace;font-weight:bold;font-size:11px;letter-spacing:2px;color:var(--device-shadow);text-shadow:1px 1px 0 rgba(255,255,255,.3)}
.help-btn,.mute-btn{
  width:22px;height:22px;border-radius:5px;
  background:var(--btn);color:var(--text);border:none;
  font-weight:bold;cursor:pointer;font-size:12px;
  box-shadow:0 2px 0 var(--btn-dk),inset 1px 1px 0 rgba(255,255,255,.15);
}
.help-btn:active,.mute-btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--btn-dk)}
.top-controls{display:flex;gap:4px}
.name-banner{
  text-align:center;font-family:'Courier New',monospace;font-weight:bold;
  font-size:11px;letter-spacing:1px;color:var(--device-shadow);
  padding:3px 0;text-shadow:0 1px 0 rgba(255,255,255,.3);
  background:rgba(0,0,0,.12);border-radius:3px;margin-bottom:6px;
}
/* Marco de la pantalla LCD */
.screen-frame{
  background:linear-gradient(145deg,#252320,#100e0c);
  padding:8px;border-radius:6px;
  box-shadow:
    inset 4px 4px 8px rgba(0,0,0,.7),
    inset -2px -2px 4px rgba(255,255,255,.05),
    0 1px 0 var(--device-hl);
}
.screen{
  background:var(--screen-bg);
  border:2px solid var(--screen-dk);border-radius:2px;
  padding:5px;position:relative;height:200px;overflow:hidden;
  box-shadow:inset 0 0 28px rgba(31,38,20,.35);
}
#screen{width:100%;height:170px;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;display:block}
.status-bubble{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:var(--screen-dk);color:var(--screen-bg);font-family:'Courier New',monospace;font-size:9px;font-weight:bold;padding:3px 8px;border-radius:8px;letter-spacing:.5px;z-index:2;white-space:nowrap;box-shadow:0 2px 3px rgba(0,0,0,.4);animation:pop .3s ease-out}
.status-bubble.hidden{display:none}
@keyframes pop{0%{transform:translateX(-50%) scale(.4);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}
.status-bar{position:absolute;bottom:3px;left:6px;right:6px;display:flex;justify-content:space-between;font-family:'Courier New',monospace;font-size:9px;font-weight:bold;color:var(--screen-dk);letter-spacing:.5px;z-index:1}
.hatch-progress{margin:6px 4px 0;display:none}
.hatch-progress.visible{display:block}
.hatch-label{font-size:9px;font-weight:bold;color:var(--device-shadow);font-family:'Courier New',monospace;text-align:center;margin-bottom:3px;letter-spacing:.5px}
.hatch-bar{height:6px;background:rgba(0,0,0,.25);border-radius:3px;overflow:hidden}
.hatch-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffd089,#ffae3a);transition:width .4s}
.needs-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 2px 4px}
.need{display:flex;flex-direction:column;align-items:center;gap:2px}
.need-icon-wrap{font-size:13px;line-height:1}
.bar{width:100%;height:6px;background:rgba(0,0,0,.28);border-radius:3px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}
.fill{height:100%;width:100%;background:linear-gradient(90deg,#4caf50,#8fde6f);transition:width .4s,background .3s}
.fill.warn{background:linear-gradient(90deg,#ec9b1e,#f3c25c)}
.fill.crit{background:linear-gradient(90deg,#c44a3a,#ee6e6a);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.need-label{font-size:7px;font-weight:bold;color:var(--device-shadow);text-transform:uppercase;letter-spacing:.3px}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:3px 2px 4px;font-family:'Courier New',monospace;font-size:9px;font-weight:bold}
.stat{background:rgba(0,0,0,.25);color:var(--text);padding:3px 4px;border-radius:3px;text-align:center;display:flex;justify-content:space-between;gap:2px}
.stat span{color:#ffe89a}
.age-line{text-align:center;font-family:'Courier New',monospace;font-size:9px;color:var(--device-shadow);font-weight:bold;margin:0 0 8px;letter-spacing:.3px}
.buttons-group{display:flex;flex-direction:column;gap:7px}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:0 2px}
.buttons.primary-row{grid-template-columns:2fr 2fr 1fr}
.btn{
  background:linear-gradient(145deg,#4a4640,var(--btn));color:var(--text);
  border:none;border-radius:8px;padding:6px 2px 4px;cursor:pointer;
  box-shadow:0 3px 0 var(--btn-dk),inset 1px 1px 2px rgba(255,255,255,.12);
  transition:transform .08s,box-shadow .08s;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  position:relative;font-family:inherit;min-height:50px;
  -webkit-touch-callout:none;user-select:none;
}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--btn-dk)}
.btn-icon{font-size:17px;line-height:1}
.btn-label{font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:.3px}
.btn-key{position:absolute;top:2px;right:3px;font-size:7px;font-family:'Courier New',monospace;opacity:.5}
.btn.primary{background:linear-gradient(145deg,#e09144,var(--orange));color:#fff}
.btn.primary.danger{background:linear-gradient(145deg,#d05050,var(--red))}
.btn.small{background:linear-gradient(145deg,#555,#222)}
/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:100;padding:14px}
.modal.hidden{display:none}
.modal-content{background:var(--screen-bg);border:3px solid var(--screen-dk);border-radius:8px;padding:14px;max-width:95%;width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.7);color:var(--screen-dk);font-family:'Trebuchet MS',sans-serif}
.modal h2{margin-bottom:8px;text-align:center;letter-spacing:1px;font-size:16px}
.modal p{margin-bottom:8px;line-height:1.35;font-size:12px}
.modal .actions{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.modal .actions button{background:var(--screen-dk);color:var(--text);border:none;padding:8px 14px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:bold;letter-spacing:.5px;font-size:12px;min-height:36px}
.modal .actions button.danger{background:var(--red)}
.modal .actions button.success{background:#3a8a4a}
.minigame-canvas{display:block;margin:6px auto;background:#d8e0c0;border:2px solid var(--screen-dk);image-rendering:pixelated;border-radius:3px;max-width:100%}
.minigame-info{text-align:center;font-weight:bold;font-size:12px;margin:5px 0}
.battle-ui{display:flex;flex-direction:column;gap:6px}
.battle-status{display:flex;justify-content:space-between;font-size:10px;font-weight:bold;align-items:center;flex-wrap:wrap;gap:4px}
.hp-bar{width:100%;height:9px;background:rgba(0,0,0,.3);border:1px solid var(--screen-dk);border-radius:4px;overflow:hidden;margin-bottom:3px}
.hp-bar .hp-fill{height:100%;background:linear-gradient(90deg,#4a8c3a,#7fd45f);transition:width .4s}
.attack-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:6px}
.attack-btn{background:var(--screen-dk);color:var(--text);border:2px solid #1a1f12;padding:6px 3px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:bold;display:flex;flex-direction:column;gap:2px;min-height:50px}
.attack-btn:disabled{opacity:.4;cursor:not-allowed}
.attack-btn .type-tag{font-size:8px;padding:1px 3px;border-radius:3px}
.type-fire{background:#d9534f;color:#fff}
.type-water{background:#3a8acb;color:#fff}
.type-plant{background:#4a8c3a;color:#fff}
.type-elec{background:#d4b03a;color:#2f3a23}
.type-earth{background:#8a6a3a;color:#fff}
.battle-log{background:rgba(255,255,255,.4);border-radius:5px;padding:6px;font-size:10px;min-height:48px;max-height:70px;overflow-y:auto;font-style:italic}
.error-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;padding:14px}
.error-overlay.hidden{display:none}
.error-box{background:#fff;border-radius:10px;padding:16px;max-width:400px;font-family:'Courier New',monospace;color:#333}
.error-title{color:#c44a3a;font-weight:bold;margin-bottom:8px;font-size:15px}
.error-msg{font-size:11px;margin-bottom:10px;word-break:break-word}
.error-box button{background:#c44a3a;color:#fff;border:none;padding:8px 14px;border-radius:5px;cursor:pointer}
@media (max-width:420px){
  body{padding:6px}
  .device{padding:14px 12px 18px;max-width:100%;border-radius:10px 10px 14px 14px}
  .screen{height:185px}
  #screen{height:155px}
  .btn{min-height:46px;border-radius:6px}
  .btn-icon{font-size:15px}
  .btn-label{font-size:8px}
  .need-icon-wrap{font-size:12px}
  .modal-content{padding:12px;width:100%}
  .modal h2{font-size:14px}
  .modal p{font-size:11px}
}
@media (max-height:680px){
  .device{padding-top:14px;padding-bottom:16px}
  .screen{height:170px}
  #screen{height:140px}
}
</style>
</head>

<script>
/* === Sistema de audio sintetizado (Web Audio API, 8-bit chiptune) === */
var AUDIO = {
  ctx: null,
  muted: false,
  musicOn: true,
  musicTimer: null,
  musicStep: 0,
  masterGain: null,
  init: function () {
    if (this.ctx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.18;
      this.masterGain.connect(this.ctx.destination);
    } catch (e) { console.warn('AudioContext no disponible:', e); }
  },
  resume: function () {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  // Beep básico: freq Hz, dur s, tipo de onda
  beep: function (freq, dur, type, vol) {
    if (this.muted || !this.ctx) return;
    if (vol == null) vol = 0.5;
    var t = this.ctx.currentTime;
    var osc = this.ctx.createOscillator();
    var g = this.ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(this.masterGain);
    osc.start(t); osc.stop(t + dur + 0.02);
  },
  // Ráfaga de varias notas
  sequence: function (notes, opts) {
    if (this.muted || !this.ctx) return;
    var self = this;
    opts = opts || {};
    var step = opts.step || 0.08;
    var dur = opts.dur || 0.07;
    var type = opts.type || 'square';
    var vol = opts.vol || 0.5;
    notes.forEach(function (f, i) {
      setTimeout(function () { self.beep(f, dur, type, vol); }, i * step * 1000);
    });
  },
  // === Efectos de sonido === ///
  sfxBtn:     function(){ this.beep(880, 0.04, 'square', 0.35); },
  sfxFeed:    function(){ this.sequence([523, 659, 784], {step:0.06, dur:0.08}); },
  sfxClean:   function(){ this.sequence([1200, 800, 1200, 800], {step:0.05, dur:0.04, type:'triangle'}); },
  sfxSleep:   function(){ this.sequence([440, 330, 220], {step:0.12, dur:0.15, type:'triangle', vol:0.4}); },
  sfxPet:     function(){ this.sequence([659, 784, 988], {step:0.07, dur:0.1, type:'triangle'}); },
  sfxLevel:   function(){ this.sequence([523, 659, 784, 1047], {step:0.08, dur:0.1}); },
  sfxEvolve:  function(){ this.sequence([392, 494, 587, 698, 784, 988, 1175], {step:0.1, dur:0.15}); },
  sfxHatch:   function(){ this.sequence([330, 440, 523, 659, 880], {step:0.08, dur:0.1}); },
  sfxHit:     function(){ this.beep(120, 0.15, 'sawtooth', 0.5); },
  sfxCrit:    function(){ this.sequence([1500, 800, 1500, 800], {step:0.04, dur:0.04, type:'sawtooth', vol:0.4}); },
  sfxWin:     function(){ this.sequence([523, 659, 784, 1047, 1319], {step:0.1, dur:0.15}); },
  sfxLose:    function(){ this.sequence([523, 415, 311, 220], {step:0.15, dur:0.2, type:'sawtooth', vol:0.4}); },
  sfxSick:    function(){ this.sequence([220, 200, 180, 160], {step:0.15, dur:0.2, type:'sawtooth', vol:0.3}); },
  sfxDeath:   function(){ this.sequence([220, 175, 147, 110, 87], {step:0.2, dur:0.3, type:'sawtooth', vol:0.4}); },
  sfxHungry:  function(){ this.sequence([523, 392], {step:0.15, dur:0.1, vol:0.3}); },
  sfxHappy:   function(){ this.sequence([880, 1047], {step:0.1, dur:0.08, vol:0.3}); },
  sfxClick:   function(){ this.beep(660, 0.03, 'square', 0.3); },
  sfxCorrect: function(){ this.sequence([659, 988], {step:0.06, dur:0.08}); },
  sfxWrong:   function(){ this.beep(140, 0.2, 'sawtooth', 0.4); },

  // === Música de fondo === ///
  // Melodía 8-bit en loop, tipo Tamagotchi
  melody: [
    523, 659, 784, 659,
    523, 587, 659, 523,
    440, 523, 659, 523,
    392, 440, 523, 440
  ],
  startMusic: function () {
    var self = this;
    if (this.musicTimer || !this.ctx) return;
    this.musicStep = 0;
    this.musicTimer = setInterval(function () {
      if (self.muted || !self.musicOn) return;
      var note = self.melody[self.musicStep % self.melody.length];
      var t = self.ctx.currentTime;
      var osc = self.ctx.createOscillator();
      var g = self.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(note, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.06, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
      osc.connect(g); g.connect(self.masterGain);
      osc.start(t); osc.stop(t + 0.2);
      self.musicStep++;
    }, 280);
  },
  stopMusic: function () {
    if (this.musicTimer) { clearInterval(this.musicTimer); this.musicTimer = null; }
  },
  toggleMute: function () {
    this.muted = !this.muted;
    if (this.muted) this.stopMusic();
    else { this.init(); this.resume(); this.startMusic(); }
    return this.muted;
  }
};
/* Sprites B&N puro (estilo Tamagotchi/Digivice 90s) */
const PALETTE={'#':'#1f2614','o':'#1f2614','O':'#1f2614','*':'#1f2614','w':'#e9e4d4','r':'#1f2614'};
const SPRITES={

function drawSprite(ctx,name,x,y,scale,frame,tint){
  if(scale==null)scale=4;if(frame==null)frame=0;
  var s=SPRITES[name];if(!s)return;
  var g=s[frame%s.length];
  for(var r=0;r<g.length;r++){var l=g[r];for(var c=0;c<l.length;c++){
    var ch=l[c];if(ch==='.')continue;
    ctx.fillStyle=PALETTE[ch]||'#1f2614';
    ctx.fillRect(x+c*scale,y+r*scale,scale,scale);
  }}
}

 * Ciclo pentagonal:
 *   Fuego  → Planta  (super efectivo)
 *   Planta → Tierra
 *   Tierra → Eléctrico

 *   Agua   → Fuego
 * Cada tipo es débil al que lo gana (recibe 0.5x).
 * Las parejas no relacionadas hacen daño normal (1x).
 */

const TYPE_NAMES_ES = {

// Quién es fuerte contra quién (multiplicador 1.5x)
const STRONG_AGAINST = {
  fire:  'plant',
  plant: 'earth',
  earth: 'elec',
  elec:  'water',
  water: 'fire',
};

/** Devuelve multiplicador de daño del atacante vs defensor */
function typeMultiplier(attacker, defender) {
  if (STRONG_AGAINST[attacker] === defender) return 1.5;
  if (STRONG_AGAINST[defender] === attacker) return 0.6;
  return 1.0;
}

/** Devuelve etiqueta legible para la efectividad */
function effectivenessLabel(mult) {
  if (mult >= 1.5) return '¡Muy efectivo!';
  if (mult <= 0.6) return 'Poco efectivo...';
  return '';
}

/* === Monster ===
 * Etapas:
 *   0 EGG    (huevo)
 *   1 BABY   (5 niveles: 1..5)
 *   2 ROOKIE (10 niveles: 6..15)
 *   3 CHAMP  (10 niveles: 16..25)
 * Las ramas: 'str', 'agi', 'int', 'bal'.
 * El stat dominante al evolucionar fija la rama.
 */

const STAGE = { EGG: 0, BABY: 1, ROOKIE: 2, CHAMP: 3, DEAD: 4 };

const STAGE_NAMES = {
  0: 'HUEVO',
  1: 'BEBÉ',
  2: 'ROOKIE',
  3: 'CHAMPION',
  4: 'DESCANSANDO',
};

const BRANCH_NAMES = {
  str: 'Guerrero',
  agi: 'Veloz',
  int: 'Sabio',
  bal: 'Balanceado',
};

const XP_PER_LEVEL = lvl => 20 + lvl * 12;
const HATCH_AGE_MIN = 30;         // 30 segundos reales (con 1s = 1 game-min)
const BABY_MAX_LVL = 5;
const ROOKIE_MAX_LVL = 15;
const CHAMP_MAX_LVL = 25;

function createMonster(name) {
  if (!name) name = 'Mochi';
  return {
    name: name,
    stage: STAGE.EGG,
    branch: 'bal',
    type: pick(TYPES),
    lineage: Math.floor(Math.random() * 3),
    level: 0,
    xp: 0,
    stats: { str: 1, agi: 1, int: 1 },
    hp: 20,
    maxHp: 20,
    age: 0,
    needs: { hunger: 80, happy: 80, energy: 80, hygiene: 80 },
    sleeping: false,
    sick: false,
    sickSince: 0,
    pooCount: 0,
    bornAt: Date.now(),
    lastTick: Date.now(),
    battlesWon: 0,
    battlesLost: 0,
  };
}

function spriteForMonster(m) {
  if (m.stage === STAGE.DEAD) return 'skull';
  if (m.stage === STAGE.EGG) return 'egg';
  var lin = (m.lineage == null) ? 0 : m.lineage;
  if (m.stage === STAGE.BABY) return 'baby_' + lin;
  var variant = (lin % 2 === 0) ? 'a' : 'b';
  if (m.stage === STAGE.ROOKIE) return 'rookie_' + m.branch + '_' + variant;
  if (m.stage === STAGE.CHAMP) return 'champ_' + m.branch + '_a';
  return 'baby_0';
}

function computeBranch(stats) {
  const s = stats.str;
  const a = stats.agi;
  const i = stats.int;
  const max = Math.max(s, a, i);
  const avg = (s + a + i) / 3;
  if (max - avg < avg * 0.18) return 'bal';
  if (max === s) return 'str';
  if (max === a) return 'agi';
  return 'int';
}

function giveXP(m, amount) {
  if (m.stage === STAGE.EGG || m.stage === STAGE.DEAD) return [];
  const events = [];
  m.xp += amount;
  let needed = XP_PER_LEVEL(m.level);
  while (m.xp >= needed && m.level < CHAMP_MAX_LVL) {
    m.xp -= needed;
    m.level += 1;
    m.maxHp += 6 + Math.floor(m.stats.str * 0.5);
    m.hp = m.maxHp;
    events.push({ type: 'levelup', level: m.level });
    if (m.stage === STAGE.BABY && m.level >= BABY_MAX_LVL) {
      m.stage = STAGE.ROOKIE;
      m.branch = computeBranch(m.stats);
      events.push({ type: 'evolve', stage: STAGE.ROOKIE, branch: m.branch });
    } else if (m.stage === STAGE.ROOKIE && m.level >= ROOKIE_MAX_LVL) {
      m.stage = STAGE.CHAMP;
      m.branch = computeBranch(m.stats);
      events.push({ type: 'evolve', stage: STAGE.CHAMP, branch: m.branch });
    }
    needed = XP_PER_LEVEL(m.level);
  }
  return events;
}

function hatch(m) {
  if (m.stage !== STAGE.EGG) return false;
  m.stage = STAGE.BABY;
  m.level = 1;
  m.xp = 0;
  m.hp = m.maxHp;
  return true;
}

function addStat(m, stat, amount) {
  m.stats[stat] = (m.stats[stat] || 0) + amount;
  if (stat === 'str') m.maxHp += amount;
  if (m.hp > m.maxHp) m.hp = m.maxHp;
}

function monsterSummary(m) {
  return {
    name: m.name,
    stage: STAGE_NAMES[m.stage],
    branch: BRANCH_NAMES[m.branch] || '',
    type: TYPE_NAMES_ES[m.type],
    typeEmoji: TYPE_EMOJI[m.type],
    level: m.level,
    xp: m.xp,
    xpMax: XP_PER_LEVEL(m.level),
    hp: m.hp,
    maxHp: m.maxHp,
    str: m.stats.str,
    agi: m.stats.agi,
    int: m.stats.int,
  };
}
/* === Persistencia con localStorage ===
 * Guardamos el monstruo entero. Al cargar, calculamos cuánto tiempo
 * real pasó desde la última visita y aplicamos decay/age proporcional.
 */

const STORAGE_KEY = 'vpet_save_v2';
const REAL_MS_PER_GAME_MIN = 1000;  // 1s real = 1 min monstruo

function saveMonster(monster) {
  try {
    monster.lastTick = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(monster));
  } catch (e) {
    console.warn('No se pudo guardar:', e);
  }
}

function validateMonster(m) {
  if (!m || typeof m !== 'object') return false;
  if (typeof m.stage !== 'number') return false;
  if (!m.stats || typeof m.stats !== 'object') return false;
  if (typeof m.stats.str !== 'number') return false;
  if (!m.needs || typeof m.needs !== 'object') return false;
  if (typeof m.needs.hunger !== 'number') return false;
  if (!m.type) return false;
  return true;
}

function loadMonster() {
  try {
    // Limpiar versiones viejas
    localStorage.removeItem('vpet_save_v1');
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const m = JSON.parse(raw);
    if (!validateMonster(m)) {
      console.warn('Estado guardado inválido, reiniciando.');
      localStorage.removeItem(STORAGE_KEY);
      return null;
    }
    const now = Date.now();
    const elapsedMs = now - (m.lastTick || now);
    const elapsedMin = Math.max(0, Math.floor(elapsedMs / REAL_MS_PER_GAME_MIN));
    if (elapsedMin > 0) {
      applyOfflineDecay(m, elapsedMin);
      m.lastTick = now;
    }
    return m;
  } catch (e) {
    console.warn('No se pudo cargar:', e);
    return null;
  }
}

function clearSave() {
  localStorage.removeItem(STORAGE_KEY);
}

/** Aplica decay equivalente a "min" minutos del monstruo */
function applyOfflineDecay(m, minutes) {
  if (m.stage === STAGE.DEAD) return;
  // Cap a 8 horas (480 min) para no liquidar al monstruo si dejas la pestaña
  const m_minutes = Math.min(minutes, 480);
  m.age += m_minutes;

  // Si está en huevo y ya tiene la edad mínima, eclosiona automáticamente
  // (se cobrará al volver, se mostrará animación si está activo)
  if (m.stage === STAGE.EGG && m.age >= HATCH_AGE_MIN) {
    hatch(m);
  }

  // Tasas (por minuto del monstruo)
  const hungerRate = m.sleeping ? 0.15 : 0.4;
  const happyRate  = 0.3;
  const energyRate = m.sleeping ? -1.5 : 0.35;  // negativo = recupera
  const hygieneRate = 0.25;

  m.needs.hunger  = clamp(m.needs.hunger  - hungerRate  * m_minutes);
  m.needs.happy   = clamp(m.needs.happy   - happyRate   * m_minutes);
  m.needs.energy  = clamp(m.needs.energy  - energyRate  * m_minutes);
  m.needs.hygiene = clamp(m.needs.hygiene - hygieneRate * m_minutes);

  // Caca: ~1 cada 30 min si come
  if (Math.random() < m_minutes / 30) m.pooCount = Math.min(3, m.pooCount + 1);

  // Verificar enfermedad y muerte
  const criticalNeeds = ['hunger', 'happy', 'energy', 'hygiene']
    .filter(k => m.needs[k] <= 0).length;
  if (criticalNeeds >= 2 || m.pooCount >= 3) {
    if (!m.sick) { m.sick = true; m.sickSince = m.age; }
    // Muere si lleva mucho tiempo enfermo (60 min)
    if (m.age - m.sickSince > 60) {
      m.stage = STAGE.DEAD;
    }
  } else if (m.sick && criticalNeeds === 0 && m.pooCount === 0) {
    m.sick = false;
  }
}

function clamp(v, lo = 0, hi = 100) {
  return Math.max(lo, Math.min(hi, v));
} /* === Necesidades y acciones de cuidado === */

/** Tick por segundo (= 1 minuto monstruo). Devuelve eventos importantes. */
function tickMonster(m) {
  if (m.stage === STAGE.DEAD) return [];
  const events = [];
  m.age += 1;

  // Eclosión automática del huevo
  if (m.stage === STAGE.EGG) {
    if (m.age >= HATCH_AGE_MIN) {
      hatch(m);
      events.push({ type: 'hatch' });
    }
    return events;
  }

  // Decay
  const hungerRate  = m.sleeping ? 0.15 : 0.4;
  const happyRate   = m.sleeping ? 0.1  : 0.3;
  const energyRate  = m.sleeping ? -1.5 : 0.35;
  const hygieneRate = 0.25;

  m.needs.hunger  = clamp(m.needs.hunger  - hungerRate);
  m.needs.happy   = clamp(m.needs.happy   - happyRate);
  m.needs.energy  = clamp(m.needs.energy  - energyRate);
  m.needs.hygiene = clamp(m.needs.hygiene - hygieneRate);

  // Despertar automático si energía llena
  if (m.sleeping && m.needs.energy >= 99) {
    m.sleeping = false;
    events.push({ type: 'wakeup' });
  }

  // Generación de caca (~3% por minuto)
  if (Math.random() < 0.033 && m.pooCount < 3) {
    m.pooCount += 1;
  }

  // Enfermedad
  const criticalNeeds = ['hunger', 'happy', 'energy', 'hygiene']
    .filter(k => m.needs[k] <= 0).length;
  if (criticalNeeds >= 2 || m.pooCount >= 3) {
    if (!m.sick) {
      m.sick = true;
      m.sickSince = m.age;
      events.push({ type: 'sick' });
    }
    // Drenaje de HP al estar enfermo
    m.hp = Math.max(0, m.hp - 0.5);
    if (m.age - m.sickSince > 60 || m.hp <= 0) {
      m.stage = STAGE.DEAD;
      events.push({ type: 'death' });
    }
  } else if (m.sick && criticalNeeds === 0 && m.pooCount === 0) {
    m.sick = false;
    events.push({ type: 'cured' });
  }

  return events;
}

/** Acciones de cuidado del jugador */
function feed(m) {
  if (m.stage === STAGE.EGG || m.stage === STAGE.DEAD) return false;
  if (m.needs.hunger >= 95) return false;
  m.needs.hunger = clamp(m.needs.hunger + 35);
  m.needs.happy = clamp(m.needs.happy + 5);
  // Riesgo de caca tras comer
  if (Math.random() < 0.35 && m.pooCount < 3) m.pooCount += 1;
  return true;
}

function clean(m) {
  if (m.stage === STAGE.EGG || m.stage === STAGE.DEAD) return false;
  m.pooCount = 0;
  m.needs.hygiene = 100;
  m.needs.happy = clamp(m.needs.happy + 5);
  return true;
}

function toggleSleep(m) {
  if (m.stage === STAGE.EGG || m.stage === STAGE.DEAD) return false;
  m.sleeping = !m.sleeping;
  return true;
}

function pet(m) {
  if (m.stage === STAGE.EGG || m.stage === STAGE.DEAD) return false;
  if (m.needs.happy >= 100) return false;
  m.needs.happy = clamp(m.needs.happy + 18);
  return true;
}

// ---------- Helpers de modal ----------

}

// 1) MATEMÁTICAS  (INT)
// ============================================================
function playMathGame(monster, onComplete) {
  const level = monster.level || 1;
  const totalRounds = 8;
  let round = 0;
  let score = 0;

  const html = `
    <h2>🧠 Entrenamiento Mental</h2>
    <p class="minigame-info">Resuelve 8 problemas. Tienes 6s cada uno.</p>
    <div class="minigame-info" id="mg-question">...</div>
    <div id="mg-options" style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;"></div>
    <div class="minigame-info" id="mg-status">Ronda 1/${totalRounds} · Aciertos: 0</div>
    <div class="actions"><button onclick="closeModal();window._mgCleanup && window._mgCleanup();">Salir</button></div>
  `;
  openModal(html);

  let timerId = null;

  function genProblem() {
    const ops = level < 5 ? ['+', '-'] : level < 12 ? ['+', '-', '×'] : ['+', '-', '×', '÷'];
    const op = pick(ops);
    let a, b, ans;
    const range = 5 + Math.min(20, level * 2);
    if (op === '+') {
      a = Math.floor(Math.random() * range) + 1;
      b = Math.floor(Math.random() * range) + 1;
      ans = a + b;
    } else if (op === '-') {
      a = Math.floor(Math.random() * range) + 2;
      b = Math.floor(Math.random() * a) + 1;
      ans = a - b;
    } else if (op === '×') {
      a = Math.floor(Math.random() * 9) + 2;
      b = Math.floor(Math.random() * 9) + 2;
      ans = a * b;
    } else {
      b = Math.floor(Math.random() * 8) + 2;
      ans = Math.floor(Math.random() * 9) + 2;
      a = b * ans;
    }
    // 4 opciones: la correcta + 3 distractores cercanos
    const set = new Set([ans]);
    while (set.size < 4) {
      const noise = (Math.floor(Math.random() * 5) - 2) || 1;
      set.add(ans + noise * (Math.floor(Math.random() * 3) + 1));
    }
    const opts = [...set].sort(() => Math.random() - 0.5);
    return { text: `${a} ${op} ${b} = ?`, ans, opts };
  }

  function next() {
    if (round >= totalRounds) return end();
    round++;
    const p = genProblem();
    document.getElementById('mg-question').textContent = p.text;
    const optsDiv = document.getElementById('mg-options');
    optsDiv.innerHTML = '';
    p.opts.forEach(o => {
      const b = document.createElement('button');
      b.textContent = o;
      b.style.cssText = 'padding:8px;font-size:18px;font-weight:bold;background:#2f3a23;color:#e9e4d4;border:none;border-radius:4px;cursor:pointer;';
      b.onclick = () => answer(o === p.ans);
      optsDiv.appendChild(b);
    });
    document.getElementById('mg-status').textContent = `Ronda ${round}/${totalRounds} · Aciertos: ${score}`;
    // Timer
    let t = 6;
    const status = document.getElementById('mg-status');
    clearInterval(timerId);
    timerId = setInterval(() => {
      t -= 0.1;
      if (t <= 0) { clearInterval(timerId); answer(false); }
    }, 100);
  }

  function answer(correct) {
    clearInterval(timerId);
    if (correct) score++;
    setTimeout(next, 250);
  }

  function end() {
    clearInterval(timerId);
    const statGain = Math.max(1, Math.floor(score / 2));
    const xpGain = score * 6;
    showResult('Matemáticas', score, totalRounds, 'INT', statGain, xpGain, onComplete);
  }

  window._mgCleanup = () => clearInterval(timerId);
  next();
}

// 2) ESQUIVA  (AGI)
// ============================================================
function playDodgeGame(monster, onComplete) {
  const html = `
    <h2>⚡ Entrenamiento de Agilidad</h2>
    <p class="minigame-info">Usa ← → o A/D para esquivar. Sobrevive 30s.</p>
    <canvas class="minigame-canvas" id="dodge-canvas" width="240" height="200"></canvas>
    <div class="minigame-info" id="dodge-info">Tiempo: 0.0s · Esquivados: 0</div>
    <div class="actions"><button onclick="window._mgEnd && window._mgEnd(true);">Rendirse</button></div>
  `;
  openModal(html);

  const canvas = document.getElementById('dodge-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  let player = { x: W / 2 - 12, y: H - 26, w: 24, h: 18, vx: 0 };
  let objs = [];
  let elapsed = 0;
  let dodged = 0;
  let running = true;
  const goal = 30;  // 30 segundos
  const keys = {};

  function kd(e) { keys[e.key.toLowerCase()] = true; }
  function ku(e) { keys[e.key.toLowerCase()] = false; }
  window.addEventListener('keydown', kd);
  window.addEventListener('keyup', ku);

  let lastSpawn = 0;
  let lastT = performance.now();
  let rafId;

  function loop(t) {
    if (!running) return;
    const dt = Math.min(40, t - lastT) / 1000;
    lastT = t;
    elapsed += dt;

    // Movimiento jugador
    const speed = 200;
    let vx = 0;
    if (keys['arrowleft'] || keys['a']) vx -= speed;
    if (keys['arrowright'] || keys['d']) vx += speed;
    player.x = Math.max(0, Math.min(W - player.w, player.x + vx * dt));

    // Spawnear objetos
    lastSpawn += dt;
    const spawnRate = Math.max(0.25, 0.85 - elapsed * 0.015);
    if (lastSpawn > spawnRate) {
      lastSpawn = 0;
      objs.push({
        x: Math.random() * (W - 14),
        y: -14,
        w: 12 + Math.random() * 8,
        h: 12,
        vy: 80 + Math.random() * 60 + elapsed * 2,
      });
    }

    // Actualizar objetos
    for (let i = objs.length - 1; i >= 0; i--) {
      const o = objs[i];
      o.y += o.vy * dt;
      // Colisión
      if (o.x < player.x + player.w && o.x + o.w > player.x &&
          o.y < player.y + player.h && o.y + o.h > player.y) {
        return end(false);
      }
      if (o.y > H) {
        objs.splice(i, 1);
        dodged++;
      }
    }

    // Render
    ctx.fillStyle = '#d8e0c0';
    ctx.fillRect(0, 0, W, H);
    // Jugador
    ctx.fillStyle = '#2f3a23';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#7a905a';
    ctx.fillRect(player.x + 4, player.y + 4, 4, 4);
    ctx.fillRect(player.x + player.w - 8, player.y + 4, 4, 4);
    // Objetos
    for (const o of objs) {
      ctx.fillStyle = '#c44a3a';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = '#2f3a23';
      ctx.fillRect(o.x + 2, o.y + 2, o.w - 4, 3);
    }

    // HUD
    const infoEl = document.getElementById('dodge-info');
    if (infoEl) infoEl.textContent = `Tiempo: ${elapsed.toFixed(1)}s / ${goal}s · Esquivados: ${dodged}`;

    if (elapsed >= goal) return end(true);
    rafId = requestAnimationFrame(loop);
  }

  function end(survived) {
    running = false;
    cancelAnimationFrame(rafId);
    window.removeEventListener('keydown', kd);
    window.removeEventListener('keyup', ku);
    const ratio = Math.min(1, elapsed / goal);
    const statGain = Math.max(1, Math.floor(ratio * 6 + dodged / 8));
    const xpGain = Math.floor(elapsed * 1.5 + dodged * 2);
    showResult('Esquiva', Math.floor(elapsed), goal, 'AGI', statGain, xpGain, onComplete, survived ? '¡Sobreviviste!' : 'Te dieron...');
  }

  window._mgEnd = end;
  window._mgCleanup = () => {
    running = false;
    cancelAnimationFrame(rafId);
    window.removeEventListener('keydown', kd);
    window.removeEventListener('keyup', ku);
  };

  rafId = requestAnimationFrame(loop);
}

// 3) CLICK SYNC  (STR)
// ============================================================
function playClickSyncGame(monster, onComplete) {
  const html = `
    <h2>💪 Entrenamiento de Fuerza</h2>
    <p class="minigame-info">Click cuando el marcador esté en la zona verde. 5 rondas.</p>
    <canvas class="minigame-canvas" id="sync-canvas" width="280" height="80"></canvas>
    <div class="minigame-info" id="sync-info">Ronda 1/5 · Puntos: 0</div>
    <div class="actions">
      <button id="sync-click" style="background:#a83a3a;font-size:16px;padding:10px 20px;">¡GOLPEAR! (Espacio)</button>
      <button onclick="window._mgEnd && window._mgEnd();">Salir</button>
    </div>
  `;
  openModal(html);

  const canvas = document.getElementById('sync-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  let round = 0;
  const totalRounds = 5;
  let totalScore = 0;
  let pos = 0;
  let dir = 1;
  let speed = 2.0;
  let running = true;
  let rafId;
  let canClick = true;

  const zoneStart = 0.45;
  const zoneEnd = 0.55;

  function draw() {
    ctx.fillStyle = '#d8e0c0';
    ctx.fillRect(0, 0, W, H);
    // Barra
    const barY = 30;
    ctx.fillStyle = '#2f3a23';
    ctx.fillRect(8, barY, W - 16, 24);
    ctx.fillStyle = '#9bb27a';
    ctx.fillRect(10, barY + 2, W - 20, 20);
    // Zona verde
    const zsx = 10 + (W - 20) * zoneStart;
    const zex = 10 + (W - 20) * zoneEnd;
    ctx.fillStyle = '#4a8c3a';
    ctx.fillRect(zsx, barY + 2, zex - zsx, 20);
    // Marcador
    const mx = 10 + (W - 20) * pos;
    ctx.fillStyle = '#c44a3a';
    ctx.fillRect(mx - 3, barY - 4, 6, 32);
    ctx.fillStyle = '#2f3a23';
    ctx.fillRect(mx - 4, barY - 4, 1, 32);
    ctx.fillRect(mx + 3, barY - 4, 1, 32);
  }

  function loop() {
    if (!running) return;
    pos += dir * speed / 100;
    if (pos >= 1) { pos = 1; dir = -1; }
    if (pos <= 0) { pos = 0; dir = 1; }
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function attempt() {
    if (!running || !canClick) return;
    canClick = false;
    // Puntuación según distancia al centro
    const center = (zoneStart + zoneEnd) / 2;
    const dist = Math.abs(pos - center);
    let pts = 0, label = '';
    if (pos >= zoneStart && pos <= zoneEnd) {
      pts = 10 - Math.floor(dist * 40);  // 8-10 si dentro
      pts = Math.max(6, pts);
      label = pts >= 9 ? '¡PERFECTO!' : '¡Bien!';
    } else {
      pts = 1;
      label = 'Fallo...';
    }
    totalScore += pts;
    round++;
    flashLabel(label);
    document.getElementById('sync-info').textContent = `Ronda ${round}/${totalRounds} · Puntos: ${totalScore}`;
    if (round >= totalRounds) {
      setTimeout(end, 500);
    } else {
      // siguiente ronda: aumentar velocidad
      speed = 2.0 + round * 0.6;
      setTimeout(() => { canClick = true; }, 350);
    }
  }

  function flashLabel(text) {
    const i = document.getElementById('sync-info');
    if (!i) return;
    i.style.color = '#a83a3a';
    i.textContent = text + ' (+pts)';
    setTimeout(() => { if (i) i.style.color = ''; }, 350);
  }

  function end() {
    running = false;
    cancelAnimationFrame(rafId);
    window.removeEventListener('keydown', spaceHandler);
    const statGain = Math.max(1, Math.floor(totalScore / 7));
    const xpGain = totalScore * 3;
    showResult('Fuerza', totalScore, totalRounds * 10, 'STR', statGain, xpGain, onComplete);
  }

  function spaceHandler(e) {
    if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); attempt(); }
  }
  window.addEventListener('keydown', spaceHandler);
  document.getElementById('sync-click').onclick = attempt;

  window._mgEnd = end;
  window._mgCleanup = () => {
    running = false;
    cancelAnimationFrame(rafId);
    window.removeEventListener('keydown', spaceHandler);
  };

  rafId = requestAnimationFrame(loop);
}

/* === Batalla por turnos vs IA === */

function generateRival(playerLevel, playerType) {
  // Tipo aleatorio (60% prob de elegir uno fuerte vs el jugador para reto)
  let rivalType;
  if (Math.random() < 0.55) {
    // El que es fuerte contra el jugador
    rivalType = Object.keys(STRONG_AGAINST).find(k => STRONG_AGAINST[k] === playerType) || pick(TYPES);
  } else {
    rivalType = pick(TYPES);
  }
  const lvl = Math.max(1, playerLevel + Math.floor(Math.random() * 3) - 1);
  const power = 1 + lvl * 0.4;
  const maxHp = 25 + lvl * 8;
  return {
    name: 'Rival ' + TYPE_NAMES_ES[rivalType],
    type: rivalType,
    level: lvl,
    stats: {
      str: Math.floor(power * (2 + Math.random() * 2)),
      agi: Math.floor(power * (2 + Math.random() * 2)),
      int: Math.floor(power * (2 + Math.random() * 2)),
    },
    hp: maxHp,
    maxHp,
    attacks: ATTACKS[rivalType],
    isRival: true,
  };
}

function calcDamage(attacker, defender, attack) {
  const isPhysical = ['Mordisco','Embiste','Placaje','Cabezazo'].includes(attack.name);
  const atkStat = isPhysical ? attacker.stats.str : attacker.stats.int;
  const defStat = isPhysical ? defender.stats.str : defender.stats.int;

  const mult = typeMultiplier(attack.type, defender.type);
  const stab = attacker.type === attack.type ? 1.2 : 1.0;  // same type bonus
  const variance = 0.85 + Math.random() * 0.15;
  const critChance = Math.min(0.25, (attacker.stats.agi || 0) * 0.01);
  const isCrit = Math.random() < critChance;
  const critMult = isCrit ? 1.5 : 1.0;

  const base = attack.power * (1 + atkStat / 25);
  const reduction = 1 - Math.min(0.5, defStat / 80);
  let dmg = base * reduction * mult * stab * variance * critMult;
  return { damage: Math.max(1, Math.round(dmg)), mult, isCrit, isPhysical, stab };
}

    const rtCol = typeColor(rival.type);
    const html = `
      <h2>⚔ ¡Batalla!</h2>
      <canvas id="battle-canvas" width="280" height="120" class="minigame-canvas"></canvas>
      <div class="battle-ui">
        <div>
          <div class="battle-status">
            <span>${playerMonster.name} <span class="type-tag type-${playerMonster.type}">${TYPE_NAMES_ES[playerMonster.type]}</span> Lv${playerMonster.level}</span>
            <span>${Math.max(0,Math.round(playerHp))}/${playerMonster.maxHp}</span>
          </div>
          <div class="hp-bar"><div class="hp-fill" style="width:${(playerHp/playerMonster.maxHp*100)}%"></div></div>
        </div>
        <div>
          <div class="battle-status">
            <span>${rival.name} <span class="type-tag type-${rival.type}">${TYPE_NAMES_ES[rival.type]}</span> Lv${rival.level}</span>
            <span>${Math.max(0,Math.round(rivalHp))}/${rival.maxHp}</span>
          </div>
          <div class="hp-bar"><div class="hp-fill" style="width:${(rivalHp/rival.maxHp*100)}%"></div></div>
        </div>
        <div class="battle-log" id="battle-log">${log.slice(-3).map(l=>'<div>'+l+'</div>').join('')}</div>
        <div class="attack-buttons" id="attack-buttons">
          ${playerAttacks.map((a,i)=>`
            <button class="attack-btn" data-i="${i}" ${busy?'disabled':''}>
              ${a.name}
              <span class="type-tag type-${a.type}">${TYPE_NAMES_ES[a.type]} · ${a.power}</span>
            </button>
          `).join('')}
        </div>
        <div class="actions"><button onclick="window._battleFlee()">Huir</button></div>
      </div>
    `;
    openModal(html);

    // Pintar sprites
    const c = document.getElementById('battle-canvas');
    if (c) {
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#d8e0c0';
      ctx.fillRect(0, 0, c.width, c.height);
      // Suelo
      ctx.fillStyle = '#a8b88a';
      ctx.fillRect(0, 92, c.width, 28);
      // Jugador izq
      drawSprite(ctx, playerSprite, 30, 25, 3, 0, ptCol);
      // Rival der
      drawSprite(ctx, rivalSprite, 180, 25, 3, 0, rtCol);
    }

    document.querySelectorAll('.attack-btn').forEach(btn => {
      btn.onclick = () => {
        if (busy) return;
        const i = parseInt(btn.dataset.i);
        playerTurn(playerAttacks[i]);
      };
    });
  }

  function pushLog(msg) {
    log.push(msg);
    if (log.length > 6) log.shift();
  }

  function playerTurn(attack) {
    if (busy) return;
    busy = true;
    const playerSpeed = playerMonster.stats.agi || 0;
    const rivalSpeed = rival.stats.agi || 0;
    const playerFirst = playerSpeed >= rivalSpeed;
    const rivalAttack = chooseAiAttack(rival, playerMonster);

    const seq = playerFirst
      ? [['p', attack], ['r', rivalAttack]]
      : [['r', rivalAttack], ['p', attack]];

    let i = 0;
    function step() {
      if (i >= seq.length) {
        // Fin del turno
        busy = false;
        render();
        // Chequear muertes
        if (rivalHp <= 0) return endBattle(true);
        if (playerHp <= 0) return endBattle(false);
        return;
      }
      const [who, atk] = seq[i++];
      if (who === 'p') {
        const r = calcDamage(playerMonster, rival, atk);
        rivalHp = Math.max(0, rivalHp - r.damage);
        pushLog(`<strong>${playerMonster.name}</strong> usó <em>${atk.name}</em>. ${r.isCrit?'💥 ¡CRÍTICO! ':''}${effectivenessLabel(r.mult)} (-${r.damage})`);
      } else {
        const r = calcDamage(rival, playerMonster, atk);
        playerHp = Math.max(0, playerHp - r.damage);
        pushLog(`<strong>${rival.name}</strong> usó <em>${atk.name}</em>. ${r.isCrit?'💥 ¡CRÍTICO! ':''}${effectivenessLabel(r.mult)} (-${r.damage})`);
      }
      render();
      // Si alguien muere, parar la secuencia
      if (rivalHp <= 0 || playerHp <= 0) {
        busy = false;
        setTimeout(() => {
          if (rivalHp <= 0) endBattle(true);
          else if (playerHp <= 0) endBattle(false);
        }, 700);
        return;
      }
      setTimeout(step, 800);
    }
    step();
  }

  function chooseAiAttack(rival, target) {
    // 70%: el que más daño hace; 30%: random
    if (Math.random() < 0.7) {
      let best = rival.attacks[0], bestDmg = 0;
      for (const atk of rival.attacks) {
        const r = calcDamage(rival, target, atk);
        if (r.damage > bestDmg) { bestDmg = r.damage; best = atk; }
      }
      return best;
    }
    return pick(rival.attacks);
  }

  function endBattle(victory) {
    playerMonster.hp = Math.max(1, Math.round(playerHp));
    playerMonster.needs.energy = clamp(playerMonster.needs.energy - 15);
    let xpGain = 0;
    let msg = '';
    if (victory) {
      playerMonster.battlesWon = (playerMonster.battlesWon || 0) + 1;
      xpGain = 20 + rival.level * 8;
      msg = `🏆 ¡Victoria! Ganas ${xpGain} XP.`;
    } else {
      playerMonster.battlesLost = (playerMonster.battlesLost || 0) + 1;
      xpGain = 5;
      playerMonster.needs.happy = clamp(playerMonster.needs.happy - 20);
      msg = `💀 Derrota. Pierdes algo de felicidad y ganas ${xpGain} XP de aliento.`;
    }
    const html = `
      <h2>${victory?'🏆 ¡Victoria!':'💔 Derrota'}</h2>
      <p class="minigame-info">${msg}</p>
      <div class="actions"><button class="${victory?'success':''}" onclick="window._battleClose()">Continuar</button></div>
    `;
    openModal(html);
    window._battleClose = () => {
      closeModal();
      onEnd && onEnd({ victory, xpGain, rival });
      window._battleClose = null;
      window._battleFlee = null;
    };
  }

  window._battleFlee = () => {
    playerMonster.hp = Math.max(1, Math.round(playerHp));
    playerMonster.needs.happy = clamp(playerMonster.needs.happy - 8);
    closeModal();
    onEnd && onEnd({ victory: false, xpGain: 0, rival, fled: true });
  };

  render();
}
/* Main loop */
(function () {
  var canvas = document.getElementById('screen');
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  var monster = loadMonster();
  if (!monster) { monster = createMonster(promptName()); saveMonster(monster); }
  var frame = 0, lastTickReal = Date.now(), lastBubble = '', bubbleUntil = 0;
  var W = canvas.width, H = canvas.height;
  // Estado de animaciones puntuales
  var eatAnim = null;  // {startFrame, duration} animación comida
  var hurtAnim = 0;    // frames restantes shake
  // === Init audio (lazy: hasta primer click por política de navegadores) ===
  function audioBoot(){
    AUDIO.init(); AUDIO.resume();
    if (AUDIO.musicOn && !AUDIO.muted) AUDIO.startMusic();
    document.removeEventListener('click', audioBoot);
    document.removeEventListener('keydown', audioBoot);
    document.removeEventListener('touchstart', audioBoot);
  }
  document.addEventListener('click', audioBoot, {once:false});
  document.addEventListener('keydown', audioBoot, {once:false});
  document.addEventListener('touchstart', audioBoot, {once:false});

  function renderScreen() {
    ctx.fillStyle = '#9bb27a'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(31,38,20,0.04)';
    for (var y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
    if (monster.stage === STAGE.DEAD) {
      drawSprite(ctx, 'skull', (W - 80) / 2, 50, 5, 0);
      ctx.fillStyle = '#1f2614'; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('R.I.P.', W / 2, 160); ctx.fillText(monster.name, W / 2, 178);
      return;
    }
    if (monster.stage === STAGE.EGG) { drawEgg(); return; }
    drawBody();
    drawExtras();
  }

  function drawEgg() {
    var progress = Math.min(1, monster.age / HATCH_AGE_MIN);
    var sprite = 'egg', fSpeed = 60;
    if (progress < 0.4) fSpeed = 80;
    else if (progress < 0.75) fSpeed = 40;
    else { sprite = 'egg_cracking'; fSpeed = 12; }
    var wf = Math.floor(frame / fSpeed) % 3;
    var scale = 6, bx = (W - 96) / 2, by = (H - 96) / 2 - 6;
    var sx = 0, sy = 0;
    if (progress > 0.85) { sx = (Math.random()-0.5)*4; sy = (Math.random()-0.5)*2; }
    drawSprite(ctx, sprite, bx + sx, by + sy, scale, wf);
    if (progress > 0.9 && Math.random() < 0.3) {
      ctx.fillStyle = '#fff5cf';
      for (var i = 0; i < 4; i++) ctx.fillRect(bx + 20 + Math.random()*56, by - 10 + Math.random()*30, 3, 3);
    }
  }

  function drawBody() {
    // === Animación de sway lateral más amplia ===
    // El monstruo se balancea de lado a lado siguiendo una onda seno
    var t = frame * 0.04;
    var swayX = monster.sleeping ? 0 : Math.sin(t) * 12;   // -12 a +12 pixels
    var swayY = monster.sleeping ? 0 : Math.abs(Math.sin(t*2)) * -3; // ligero bote
    // Frame visual alterna con el sway (mira hacia donde camina)
    var b2 = (Math.sin(t) > 0) ? 1 : 0;
    // Shake si está dolido
    if (hurtAnim > 0) { swayX += (Math.random()-0.5)*6; hurtAnim--; }
    var scale = 6;
    var sx = (W - 96) / 2 + swayX;
    var sy = (H - 96) / 2 + swayY - 6;
    drawSprite(ctx, spriteForMonster(monster), sx, sy, scale, b2);
    window._lastSpriteX = sx;
    window._lastSpriteY = sy;
  }

  function drawExtras() {
    var sx = window._lastSpriteX || (W - 96)/2;
    var sy = window._lastSpriteY || (H - 96)/2 - 6;
    // Cacas en la parte baja
    for (var i = 0; i < (monster.pooCount || 0); i++)
      drawSprite(ctx, 'poop', 6 + i * 30, H - 40, 2, 0);
    if (monster.sleeping) drawSprite(ctx, 'sleep', W - 52, 10, 2, 0);
    if (monster.sick) drawSprite(ctx, 'skull', W - 50, 6, 2, 0);
    if (window._heartTimer > 0) {
      var hy = sy - 14 + Math.sin(window._heartTimer*0.2)*3;
      drawSprite(ctx, 'heart', sx + 60, hy, 3, 0);
      window._heartTimer--;
    }
    // Animación de comer: el plato cae, se acerca y se hace pequeño
    if (eatAnim) {
      var phase = (frame - eatAnim.startFrame) / eatAnim.duration;
      if (phase >= 1) { eatAnim = null; }
      else {
        var fx, fy, fs;
        if (phase < 0.35) {
          // cae desde arriba
          fx = sx + 70;
          fy = -16 + (phase/0.35) * (sy + 30 - (-16));
          fs = 3;
        } else if (phase < 0.7) {
          // se acerca al monstruo (mordisco)
          var p = (phase - 0.35)/0.35;
          fx = sx + 70 - p * 30;
          fy = sy + 30;
          fs = 3;
        } else {
          // se achica y desaparece
          var p2 = (phase - 0.7)/0.3;
          fx = sx + 40;
          fy = sy + 30;
          fs = Math.max(0, 3 - p2 * 3);
        }
        if (fs > 0) drawSprite(ctx, 'food', fx, fy, fs, 0);
      }
    }
  }

  function renderUI() {
    var s = monsterSummary(monster);
    var nameEl = document.getElementById('name-banner');
    if (monster.stage === STAGE.EGG) nameEl.textContent = '🥚 HUEVO MISTERIOSO 🥚';
    else if (monster.stage === STAGE.DEAD) nameEl.textContent = '✝ ' + monster.name + ' ✝';
    else {
      var br = monster.stage >= STAGE.ROOKIE ? ' · ' + s.branch : '';
      nameEl.textContent = monster.name + ' ' + s.typeEmoji + br;
    }
    document.getElementById('stage-label').textContent = s.stage;
    document.getElementById('lvl-label').textContent =
      monster.stage === STAGE.EGG ? '...' :
      monster.stage === STAGE.DEAD ? '✝' :
      'Lv ' + s.level + ' · ' + s.xp + '/' + s.xpMax + ' XP';
    setBar('hunger-fill', monster.needs.hunger);
    setBar('happy-fill', monster.needs.happy);
    setBar('energy-fill', monster.needs.energy);
    setBar('hygiene-fill', monster.needs.hygiene);
    document.getElementById('stat-str').textContent = s.str;
    document.getElementById('stat-agi').textContent = s.agi;
    document.getElementById('stat-int').textContent = s.int;
    document.getElementById('stat-hp').textContent = Math.round(s.hp) + '/' + s.maxHp;
    document.getElementById('age-line').textContent = 'Edad: ' + formatAge(monster.age);
    var hp = document.getElementById('hatch-progress');
    if (monster.stage === STAGE.EGG) {
      hp.classList.add('visible');
      var pct = Math.min(100, (monster.age / HATCH_AGE_MIN) * 100);
      document.getElementById('hatch-fill').style.width = pct + '%';
      var rem = Math.max(0, Math.ceil(HATCH_AGE_MIN - monster.age));
      document.getElementById('hatch-label').textContent = pct >= 100 ? '¡A punto de eclosionar!' : 'Eclosión en ' + rem + 's';
    } else hp.classList.remove('visible');
    updateBubble();
  }

  function setBar(id, v) {
    var el = document.getElementById(id);
    el.style.width = Math.max(0, Math.min(100, v)) + '%';
    el.classList.remove('warn', 'crit');
    if (v < 20) el.classList.add('crit');
    else if (v < 40) el.classList.add('warn');
  }

  function formatAge(min) {
    if (min < 60) return Math.floor(min) + ' min';
    var h = Math.floor(min / 60), m = Math.floor(min % 60);
    if (h < 24) return h + 'h ' + m + 'm';
    var d = Math.floor(h / 24);
    return d + 'd ' + (h % 24) + 'h';
  }

  var lastWarnSfx = 0;
  function updateBubble() {
    var now = Date.now();
    var msg = '';
    if (monster.stage === STAGE.EGG) {
      var p = monster.age / HATCH_AGE_MIN;
      if (p < 0.3) msg = '...';
      else if (p < 0.7) msg = '*tic-tac*';
      else if (p < 0.95) msg = '*crack!*';
      else msg = '¡YA VOY!';
    } else if (monster.stage === STAGE.DEAD) msg = '';
    else if (monster.sleeping) msg = 'Zzz...';
    else if (monster.sick) msg = '🤒 Me siento mal';
    else if (monster.pooCount > 0) msg = '💩 ¡Caca!';
    else if (monster.needs.hunger < 25) { msg = '🍖 ¡Hambre!'; maybeWarnSfx('hungry'); }
    else if (monster.needs.energy < 25) msg = '😴 Cansado';
    else if (monster.needs.hygiene < 25) msg = '🧼 Sucio';
    else if (monster.needs.happy < 25) msg = '😟 Aburrido';
    else if (Math.random() < 0.003) { msg = pick(['¡Estoy genial!', '¡Juega!', '🎵 ♪ ♫']); maybeWarnSfx('happy'); }
    var b = document.getElementById('status-bubble');
    if (msg && msg !== lastBubble) {
      b.textContent = msg; b.classList.remove('hidden');
      lastBubble = msg; bubbleUntil = now + 2500;
    } else if (now > bubbleUntil && lastBubble) {
      b.classList.add('hidden'); lastBubble = '';
    }
  }
  function maybeWarnSfx(kind){
    var now = Date.now();
    if (now - lastWarnSfx < 4000) return;
    lastWarnSfx = now;
    if (kind === 'hungry') AUDIO.sfxHungry();
    else if (kind === 'happy') AUDIO.sfxHappy();
  }

  function loop() {
    try {
      frame++;
      var now = Date.now();
      if (now - lastTickReal >= REAL_MS_PER_GAME_MIN) {
        lastTickReal = now;
        handleEvents(tickMonster(monster));
        if (frame % 5 === 0) saveMonster(monster);
      }
      renderScreen(); renderUI();
    } catch (e) {
      console.error(e);
      var box = document.getElementById('error-overlay');
      var m = document.getElementById('error-msg');
      if (box && m) { m.textContent = e.message || String(e); box.classList.remove('hidden'); }
      return;
    }
    requestAnimationFrame(loop);
  }

  function handleEvents(events) {
    for (var i = 0; i < events.length; i++) {
      var ev = events[i];
      if (ev.type === 'hatch') { AUDIO.sfxHatch(); flash('🐣 ¡Eclosionó!', monster.name + ' nació. Tipo: ' + TYPE_NAMES_ES[monster.type] + ' ' + TYPE_EMOJI[monster.type]); }
      else if (ev.type === 'levelup') { AUDIO.sfxLevel(); flash('⬆ ¡Nivel ' + ev.level + '!', monster.name + ' se siente más fuerte.'); }
      else if (ev.type === 'evolve') { AUDIO.sfxEvolve(); flash('✨ ¡EVOLUCIÓN!', monster.name + ' evolucionó a ' + STAGE_NAMES[ev.stage] + ' ' + BRANCH_NAMES[ev.branch]); }
      else if (ev.type === 'sick') { AUDIO.sfxSick(); flash('🤒 Enfermo', monster.name + ' no se siente bien.'); }
      else if (ev.type === 'cured') flash('😊 Recuperado', monster.name + ' ya está bien.');
      else if (ev.type === 'death') { AUDIO.sfxDeath(); AUDIO.stopMusic(); flash('💀 Murió', monster.name + ' falleció. Pulsa Reset.'); }
      else if (ev.type === 'wakeup') flash('🌅 Despertó', monster.name + ' descansó bien.');
    }
  }

  function flash(title, body) {
    openModal('<h2>' + title + '</h2><p>' + body + '</p><div class="actions"><button class="success" onclick="closeModal()">OK</button></div>');
  }

  // Botones
  var btns = document.querySelectorAll('.btn');
  for (var i = 0; i < btns.length; i++) (function(b){
    b.addEventListener('click', function(){ AUDIO.sfxBtn(); handleAction(b.dataset.action); });
  })(btns[i]);
  document.getElementById('help-btn').addEventListener('click', function(){ AUDIO.sfxBtn(); showHelp(); });
  document.getElementById('mute-btn').addEventListener('click', function(){
    var muted = AUDIO.toggleMute();
    document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  });

  function handleAction(a) {
    if (a === 'feed') {
      if (feed(monster)) {
        eatAnim = { startFrame: frame, duration: 60 };
        AUDIO.sfxFeed();
        saveMonster(monster);
      }
    }
    else if (a === 'clean') { if (clean(monster)) { AUDIO.sfxClean(); saveMonster(monster); } }
    else if (a === 'sleep') { if (toggleSleep(monster)) { AUDIO.sfxSleep(); saveMonster(monster); } }
    else if (a === 'play') { if (pet(monster)) { window._heartTimer = 90; AUDIO.sfxPet(); saveMonster(monster); } }
    else if (a === 'train') openTrainingMenu(monster, function (r) {
      addStat(monster, r.stat, r.statGain);
      handleEvents(giveXP(monster, r.xpGain)); saveMonster(monster);
    });
    else if (a === 'battle') startBattle(monster, function (r) {
      if (r.victory) AUDIO.sfxWin(); else if (!r.fled) AUDIO.sfxLose();
      handleEvents(giveXP(monster, r.xpGain)); saveMonster(monster);
    });
    else if (a === 'reset') confirmReset();
  }

  function confirmReset() {
    openModal('<h2>Reiniciar</h2><p>Esto borrara a <strong>' + monster.name + '</strong> y empezaras con un huevo nuevo.</p><div class="actions"><button onclick="closeModal()">Cancelar</button><button class="danger" id="cr">Si, reiniciar</button></div>');
    document.getElementById('cr').onclick = function () {
      clearSave(); monster = createMonster(promptName()); saveMonster(monster); closeModal();
      if (!AUDIO.musicTimer && !AUDIO.muted) AUDIO.startMusic();
    };
  }

  function showHelp() {
    openModal('<h2>Como se juega</h2>' +
      '<p>Empieza como huevo. Eclosiona en ~30s.</p>' +
      '<p>4 necesidades bajan con el tiempo. Si 2+ llegan a 0 o tiene 3 cacas, se enferma; sigue asi y muere.</p>' +
      '<p>Botones: Comer / Limpiar / Dormir / Mimar / Entrenar / Batallar</p>' +
      '<p>Evolucion por stat dominante: FUE Guerrero, AGI Veloz, INT Sabio. Niveles 5 y 15.</p>' +
      '<p>Tipos: Fuego > Planta > Tierra > Electrico > Agua > Fuego</p>' +
      '<p>Audio: el boton de sonido arriba silencia/activa todo.</p>' +
      '<div class="actions"><button class="success" onclick="closeModal()">OK</button></div>');
  }

  function promptName() {
    var n = (prompt('Como se llama tu monstruo?', 'Mochi') || 'Mochi').trim();
    return n.slice(0, 12) || 'Mochi';
  }

  window.addEventListener('keydown', function (e) {
    var open = !document.getElementById('modal').classList.contains('hidden');
    if (open) { if (e.key === 'Escape') closeModal(); return; }
    var k = e.key.toLowerCase();
    if (k === 'a') { AUDIO.sfxBtn(); handleAction('feed'); }
    else if (k === 's') { AUDIO.sfxBtn(); handleAction('clean'); }
    else if (k === 'd') { AUDIO.sfxBtn(); handleAction('sleep'); }
    else if (k === 'f') { AUDIO.sfxBtn(); handleAction('play'); }
    else if (k === 't') { AUDIO.sfxBtn(); handleAction('train'); }
    else if (k === 'b') { AUDIO.sfxBtn(); handleAction('battle'); }
    else if (k === '?' || k === 'h') showHelp();
    else if (k === 'm') document.getElementById('mute-btn').click();
  });

  loop();

  if (monster.stage === STAGE.EGG && monster.age < 1) {
    flash('Bienvenido!', 'Tu V-Pet acaba de ser puesto. Eclosionara en ~30 segundos. Pulsa ? para ayuda o el icono de sonido para silenciar.');
  }
})();
